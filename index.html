<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロ向け商品リサーチツール</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        .note { font-size: 12px; color: #666; margin-top: 15px; text-align: left; line-height: 1.5; background: #fff3cd; padding: 10px; border-radius: 6px; }
        .highlight { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>商品リサーチ検索</h1>
    <input type="text" id="searchInput" placeholder="商品ID（型番）を入力" autofocus>
    
    <select id="genreSelect">
        <option value="時計">時計</option>
        <option value="バッグ">バッグ</option>
        <option value="スニーカー">スニーカー</option>
    </select>

    <button onclick="launchSearch()">3サイトを一斉に開く</button>
    
    <div class="note">
        【使い方】<br>
        1. 商品IDを入力し、ジャンルを選択して実行してください。<br>
        2. <span class="highlight">e-auc</span>が開く際はIDが自動コピーされます。サイト上で貼り付けて検索してください。
    </div>
</div>

<script>
async function launchSearch() {
    const id = document.getElementById('searchInput').value.trim();
    const genre = document.getElementById('genreSelect').value;
    
    if (!id) return alert("商品IDを入力してください。");

    const fullQuery = id + " " + genre;
    const encodedQuery = encodeURIComponent(fullQuery);

    // クリップボードにIDをコピー
    try { await navigator.clipboard.writeText(id); } catch (err) {}

    // すべてのジャンルで共通の3サイトを開く
    const urls = [
        // 1. soubakensaku.com (直接検索)
        `https://soubakensaku.com/contents.php?c=search_thumb_m&keyword=${encodedQuery}&name_search=partial`,
        // 2. オークファンプロ (直接検索)
        `https://pro.aucfan.com/search/list?q=${encodedQuery}`,
        // 3. e-auc (トップページを開く)
        `https://e-auc.brand-auc.com/marketPriceItems`
    ];

    urls.forEach(url => window.open(url, '_blank'));
}

document.getElementById('searchInput').addEventListener('keypress', (e) => { 
    if (e.key === 'Enter') launchSearch(); 
});
</script>

</body>
</html>
