<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロ向け商品リサーチツール</title>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 25px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .button-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-login { background-color: #6c757d; color: white; border: none; border-radius: 6px; padding: 12px; cursor: pointer; font-size: 14px; flex: 1; font-weight: bold; transition: background 0.3s; }
        .btn-login:hover { background-color: #5a6268; }
        .btn-search { background-color: #007bff; color: white; border: none; border-radius: 6px; padding: 12px; cursor: pointer; font-size: 16px; flex: 2; font-weight: bold; transition: background 0.3s; }
        .btn-search:hover { background-color: #0056b3; }

        .note { font-size: 12px; color: #666; margin-top: 15px; text-align: left; line-height: 1.6; background: #fff3cd; padding: 12px; border-radius: 6px; border-left: 4px solid #ffc107; }
        .highlight { color: #d9534f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>商品リサーチ検索</h1>
    
    <input type="text" id="searchInput" placeholder="商品ID（型番）を入力" autofocus>
    
    <select id="genreSelect">
        <option value="時計">時計</option>
        <option value="バッグ">バッグ</option>
        <option value="スニーカー">スニーカー</option>
    </select>

    <div class="button-group">
        <button class="btn-login" onclick="openLogins()" title="ログインが切れている時に押してください">1. ログイン準備</button>
        <button class="btn-search" onclick="launchSearch()">2. 3サイト一斉検索</button>
    </div>
    
    <div class="note">
        <strong>【使いかた】</strong><br>
        ① 最初に「1.ログイン準備」を押して、各サイトにログイン済か確認してください。<br>
        ② IDを入力し、ジャンルを選んで「2.一斉検索」を押します。<br>
        ③ IDは自動コピーされています。e-aucやスニダン等で必要なら貼り付けてください。
    </div>
</div>

<script>
// 1. 各サイトのログイン/トップ画面をまとめて開く
function openLogins() {
    const loginUrls = [
        "https://ssl.aucfan.com/aucfanpro/login",
        "https://e-auc.brand-auc.com/marketPriceItems",
        "https://soubakensaku.com/contents.php?c=login"
    ];
    loginUrls.forEach(url => {
        window.open(url, '_blank');
    });
}

// 2. 検索実行
async function launchSearch() {
    const id = document.getElementById('searchInput').value.trim();
    const genre = document.getElementById('genreSelect').value;
    
    if (!id) {
        alert("商品IDを入力してください。");
        return;
    }

    const encodedId = encodeURIComponent(id);
    const fullQuery = id + " " + genre;
    const encodedQuery = encodeURIComponent(fullQuery);

    // クリップボードにIDをコピー（手動貼り付け用）
    try {
        await navigator.clipboard.writeText(id);
    } catch (err) {
        console.error('コピー失敗', err);
    }

    let urls = [];

    // --- ジャンルごとに開く3サイトを出し分け ---
    if (genre === "時計") {
        urls = [
            `https://soubakensaku.com/contents.php?c=search_thumb_m&keyword=${encodedQuery}&name_search=partial`,
            `https://pro.aucfan.com/search/list?q=${encodedQuery}`,
            `https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}&va=${encodedQuery}&exflg=1&mode=2`
        ];
    } else if (genre === "バッグ") {
        urls = [
            `https://e-auc.brand-auc.com/marketPriceItems`,
            `https://pro.aucfan.com/search/list?q=${encodedQuery}`,
            `https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}&va=${encodedQuery}&exflg=1&mode=2`
        ];
    } else if (genre === "スニーカー") {
        urls = [
            `https://snkrdunk.com/search/?keyword=${encodedId}`,
            `https://search.rakuten.co.jp/search/mall/${encodedQuery}/`,
            `https://auctions.yahoo.co.jp/search/search?p=${encodedQuery}&va=${encodedQuery}&exflg=1&mode=2`
        ];
    }

    // すべてを一斉に開く
    urls.forEach(url => {
        window.open(url, '_blank');
    });
}

// Enterキー対応
document.getElementById('searchInput').addEventListener('keypress', (e) => { 
    if (e.key === 'Enter') launchSearch(); 
});
</script>

</body>
</html>
